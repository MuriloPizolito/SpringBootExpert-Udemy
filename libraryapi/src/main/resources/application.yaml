spring:
  application:
    name: libraryapi
  datasource:
    url: jdbc:postgresql://localhost:5432/library
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      # ddl-auto: update # atualiza/cria as tabelas direto pela aplicação
      ddl-auto: none # para alterar os campos do banco manualmente, sem ser direto pela aplicação
    properties:
      hibernate.format_sql: true
# gerando automaticamente as tabelas no banco de dados com JPA